server {
    listen 80;
    server_name localhost;

    # HTTPSへリダイレクト（本番環境では有効化）
    # return 301 https://$host$request_uri;

    root /var/www/public;
    index index.php index.html;

    # ファイルアップロードサイズ（商品画像を考慮して20MBに設定）
    client_max_body_size 20M;

    # セキュリティヘッダー
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # .env や隠しファイルへのアクセスを拒否
    location ~ /\. {
        deny all;
    }

    # Laravel のフロントコントローラへルーティング
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 静的ファイルのキャッシュ設定（商品画像など）
    location ~* \.(jpg|jpeg|png|gif|webp|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # PHP-FPM へ処理を渡す
    location ~ \.php$ {
        # 直接アクセス不可なPHPファイルを弾く（ディレクトリトラバーサル対策）
        try_files $uri =404;

        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # タイムアウト設定（決済処理などの重い処理を考慮）
        fastcgi_read_timeout 120;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout 120;
    }

    # アクセスログ・エラーログ
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
}

