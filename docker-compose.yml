services:
  nginx:
    image: nginx:1.21.1
    container_name: coachtech-fleama-nginx
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www/
    depends_on:
      php:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  php:
    build: ./docker/php
    container_name: coachtech-fleama-php
    volumes:
      - ./src:/var/www/
    restart: unless-stopped
    networks:
      - app-network

  mysql:
    image: mysql:8.0.26
    container_name: coachtech-fleama-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: mysqld --default-authentication-plugin=mysql_native_password
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    expose:
      - '3306'
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${MYSQL_ROOT_PASSWORD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: coachtech-fleama-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_ARBITRARY: 1
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '8080:80'
    restart: unless-stopped
    networks:
      - app-network

  mailhog:
    image: mailhog/mailhog
    container_name: coachtech-fleama-mailhog
    ports:
      - '8025:8025' # Web UI
      - '1025:1025' # SMTPサーバー
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:

volumes:
  db-data:
